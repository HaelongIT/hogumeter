# SEC-06 의존성: Dependabot/주기적 취약점 스캔 + 베이스 이미지 고정 태그.
#
# 태그를 고정하면 재현 가능해지지만, 고정한 채 방치하면 취약점이 그대로 굳는다.
# Dependabot이 그 갱신을 PR로 올린다 — 사람이 읽고 머지한다(자동 머지 없음).
#
# 검사 도구(gitleaks·shellcheck)와 리허설 도구(minio·aws-cli)는 스크립트·워크플로 안에
# `docker run`으로 박혀 있어 Dependabot이 보지 못한다. 그건 사람이 주기적으로 본다
# (pre-deploy §D). Dockerfile의 `FROM`·`COPY --from`만 자동 추적된다.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # docker-compose.yml의 `image:` (postgres:16)를 추적한다.
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dockerfile의 FROM / COPY --from 을 추적한다. 디렉토리별로 하나씩 등록해야 한다.
  - package-ecosystem: "docker"
    directory: "/collector"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/core"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/web"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gradle"
    directory: "/core"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"

  # collector는 uv.lock을 쓴다(requirements.txt 아님).
  - package-ecosystem: "uv"
    directory: "/collector"
    schedule:
      interval: "weekly"
