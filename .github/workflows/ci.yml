name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # SEC-01: 레포에 비밀 커밋 절대 금지. 히스토리 전체를 스캔한다(fetch-depth: 0).
  # 로컬 pre-commit 훅은 별건 — .githooks/pre-commit + `git config core.hooksPath .githooks`.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (히스토리 전체)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --no-banner --verbose

      # 로컬 pre-commit 훅(선택 활성화)이 실제로 도는지 확인한다. 훅은 만들기 쉽고,
      # 켜지 않으면 도는지 아무도 모른다. 차단만이 아니라 **통과**도 시험한다.
      - name: pre-commit 훅 계약 테스트
        run: bash .githooks/pre-commit.test.sh

  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test (Testcontainers 포함)
        run: ./gradlew test

  collector:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collector
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      # 통합 테스트(-m integration)는 Postgres 컨테이너를 띄워 core의 마이그레이션을 전부 적용한다.
      # ubuntu-latest에는 Docker가 있다. 빠른 루프는 로컬에서 `-m "not integration"`.
      - name: Test (Testcontainers 포함)
        run: uv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Test
        run: npm test
      - name: Typecheck + build
        run: npm run build

  # 스크립트는 이제 운영을 떠받친다(백업·복원·롤백·오프사이트·스모크·가드 훅).
  # `--severity=warning`: style/info는 걸러 신호 대 잡음을 지킨다. CRLF 셰뱅도 여기서 죽는다.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:v0.11.0 \
            --severity=warning --shell=bash scripts/*.sh .claude/hooks/*.sh .githooks/pre-commit .githooks/*.sh

  # SEC-08: robots 게이트는 fake opener 테스트만 통과했다. 실제 소켓을 만지는 경로는
  # **실 수집을 켜기 직전에 처음 실행된다.** 로컬 서버에 대고 운영과 같은 코드 경로를 리허설한다.
  # (이 드릴이 `urllib_opener`가 403/429를 예외로 던져 차단 감지가 죽어 있던 것을 잡았다.)
  robots:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: robots 게이트 리허설 (로컬 서버, 실 사이트 미접촉)
        run: bash scripts/check-robots-drill.sh

  # REL-05: 롤백 스크립트는 사고가 나야 처음 실행된다. 모든 V에 짝이 되는 R이 있는지,
  # 역순 적용이 스키마를 비우는지, 순서를 어기면 실패하는지를 일회용 컨테이너에서 확인한다.
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 마이그레이션 롤백 리허설
        run: bash scripts/rollback-drill.sh

  # REL-04: 복구 경로는 사고가 나야 처음 실행된다. 그래서 매 커밋 리허설한다.
  # 실 AWS를 부르지 않는다 — MinIO(S3 호환)에 대고 운영과 **같은 스크립트**를 돌린다.
  offsite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 오프사이트 백업 리허설 (MinIO)
        run: bash scripts/offsite-drill.sh

  # 모듈별 테스트가 전부 GREEN이어도 스택이 뜬다는 보장은 없다. 실제로 nginx가
  # proxy_pass 업스트림을 기동 시점에 해석하다 죽은 적이 있고(docs/99), 어떤 단위
  # 테스트도 그걸 못 잡았다. 여기서 브라우저가 걷는 길을 그대로 걷는다.
  smoke:
    runs-on: ubuntu-latest
    needs: [core, collector, web]
    steps:
      - uses: actions/checkout@v4
      - name: 종단 스모크 (web -> nginx -> core -> postgres)
        run: bash scripts/smoke.sh
