name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test (Testcontainers 포함)
        run: ./gradlew test

  collector:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collector
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # 통합 테스트(-m integration)는 Postgres 컨테이너를 띄워 core의 V1__init.sql을 적용한다.
      # ubuntu-latest에는 Docker가 있다. 빠른 루프는 로컬에서 `-m "not integration"`.
      - name: Test (Testcontainers 포함)
        run: uv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Test
        run: npm test
      - name: Typecheck + build
        run: npm run build
