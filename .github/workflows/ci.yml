name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # SEC-01: 레포에 비밀 커밋 절대 금지. 히스토리 전체를 스캔한다(fetch-depth: 0).
  # 로컬 pre-commit 훅은 별건 — .githooks/pre-commit + `git config core.hooksPath .githooks`.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (히스토리 전체)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --no-banner --verbose

      # gitleaks는 gzip 안을 보지 못한다. `.gitignore`에서 `backups/` 한 줄이 지워지면
      # 다음 `git add -A`가 DB 덤프를 통째로 커밋하고 CI도 통과한다.
      # ".gitignore가 옳다"를 실행 가능한 계약으로 잠근다(차단 6 · 통과 2).
      - name: .gitignore 계약 테스트
        run: bash scripts/check-gitignore.test.sh

      # 로컬 pre-commit 훅(선택 활성화)이 실제로 도는지 확인한다. 훅은 만들기 쉽고,
      # 켜지 않으면 도는지 아무도 모른다. 차단만이 아니라 **통과**도 시험한다.
      - name: pre-commit 훅 계약 테스트
        run: bash .githooks/pre-commit.test.sh

  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test (Testcontainers 포함)
        run: ./gradlew test

  collector:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collector
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # 통합 테스트(-m integration)는 Postgres 컨테이너를 띄워 core의 마이그레이션을 전부 적용한다.
      # ubuntu-latest에는 Docker가 있다. 빠른 루프는 로컬에서 `-m "not integration"`.
      - name: Test (Testcontainers 포함)
        run: uv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Test
        run: npm test
      - name: Typecheck + build
        run: npm run build

  # 스크립트는 이제 운영을 떠받친다(백업·복원·롤백·오프사이트·스모크·가드 훅).
  # `--severity=warning`: style/info는 걸러 신호 대 잡음을 지킨다. CRLF 셰뱅도 여기서 죽는다.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:v0.11.0 \
            --severity=warning --shell=bash scripts/*.sh .claude/hooks/*.sh .githooks/pre-commit .githooks/*.sh

      # OPS-01: compose에 `${NEW_VAR:-default}`를 더하고 문서화를 잊으면 운영자는 그 손잡이가
      # 있는 줄도 모른 채 조용히 기본값으로 배포한다. 차단·통과를 둘 다 시험한다.
      - name: .env.example 드리프트 게이트
        run: bash scripts/check-env-example.test.sh

      # 1차 검증/배포 전 설정 점검(SEC-02 노출·텔레그램·robots). "…할 것"에 "…했는지 확인하는 법"을 붙인다 —
      # 공개 배포인데 web 인증이 비어 데이터가 노출돼도 지금은 아무도 안 잡는다. 차단·통과를 둘 다 시험한다.
      - name: preflight 설정 점검 계약 테스트
        run: bash scripts/preflight.test.sh

      # 2026-07-22 실사고: compose가 `TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-}`로 **빈 문자열**을 넘겨
      # @ConditionalOnProperty의 두 갈래(스텁/실발송)가 둘 다 탈락 → AlertSender 빈이 사라져 core 기동
      # 실패 → smoke·backup-drill이 통째로 죽었다. `.env`가 없는 CI에서만 터져 로컬에선 안 보였다.
      # 더 나쁜 변종(`core.pipeline.enabled`)은 대안 빈이 없어 **조용히** 파이프라인이 안 뜬다.
      - name: 조건부 빈 설정 게이트 계약 테스트
        run: bash scripts/check-conditional-props.test.sh

      # REL-04: cron은 조용히 실패한다. `pre-deploy`는 cron 등록을 [필수]로 적어 뒀지만
      # **도는지 확인하는 법이 없었다** — 백업이 3일째 없어도 복구가 필요한 날에야 드러난다.
      - name: 백업 신선도 게이트 계약 테스트
        run: bash scripts/check-backup-freshness.test.sh

      # 정지조건(실 네트워크·파괴적 push)을 강제하는 훅. **훅은 만들기 쉽고, 도는지 아무도 모른다.**
      # 오차단 회귀도 함께 시험한다 — 오차단은 사람이 게이트를 끄게 만든다.
      - name: PreToolUse 가드 계약 테스트
        run: bash .claude/hooks/guard.test.sh

      # `restore-drill.sh`는 CI에 없었고 CLAUDE.md는 "전부 CI가 돌린다"고 적어 두고 있었다.
      # 손으로 대조해 고쳤지만 다음 드릴을 만들 때 또 잊는다. 사람의 기억을 장치로 바꾼다.
      # (이 게이트는 자기 자신도 검사한다 — 만들자마자 "CI에 없다"고 스스로를 잡았다.
      #  `check-table-wiring.test.sh`를 만들었을 때도 곧바로 잡았다.)
      - name: 드릴·계약 테스트의 CI 커버리지 게이트
        run: bash scripts/check-ci-coverage.test.sh

      # `alert_policy`는 읽히기만 하고(목표가 알림이 발화 불가), `review_queue_item`은 쌓이기만 했다
      # (볼 수가 없었다). 둘 다 모든 테스트가 GREEN인 채였다. 그 상류 — **아무도 쓰지도 읽지도
      # 않는 테이블** — 을 막는다. 면제는 열린 Q-ID와 함께 선언하고, Q가 해소되면 면제가 만료된다.
      - name: 테이블 배선 게이트 계약 테스트
        run: bash scripts/check-table-wiring.test.sh

      # 위 게이트는 **테이블** 이름만 본다 — 테이블은 살아 있는데 **컬럼**이 죽은 경우(`deal_event.confidence`가
      # V1부터 채우는 코드 0·읽는 코드 0)는 못 잡는다(그 게이트의 명시된 한계). 2026-07-10 수동 컬럼 감사가
      # confidence를 놓쳤다 — 유일한 언급이 javadoc이라 "이름이 나타난다"에 걸렸다. 한 층 아래에서 잡는다.
      - name: 죽은 컬럼 게이트 계약 테스트
        run: bash scripts/check-dead-columns.test.sh

      # 위 게이트들은 "무엇이 죽었나"를 본다. 이건 반대다 — **살아 있는데 잘못된 곳으로 흐르는 것**.
      # collector의 파서는 전부 같은 `ParsedDeal`을 내고 같은 `raw_deal_post`로 간다. 그래서
      # `parse_bunjang`(중고)이 켜지는 순간 중고 가격이 신품 기준가로 들어갈 참이었다(2026-07-22 발견).
      # 각 파서가 core에서 어떻게 해석되는지(신품 허용집합 / 중고 선언) 분류를 강제한다.
      - name: 수집 소스 어휘 게이트
        run: bash scripts/check-source-vocabulary.sh

      - name: 수집 소스 어휘 게이트 계약 테스트
        run: bash scripts/check-source-vocabulary.test.sh

      # 위 게이트는 "테이블 이름이 코드에 나타나면" 통과시킨다 — `product_axis`처럼 **쓰기만 하고
      # 아무도 읽지 않는 테이블**은 못 잡는다(명시된 한계). 한 층 아래에서 잡는다:
      # 리포지토리가 선언한 조회 메서드를 프로덕션에서 아무도 부르지 않으면 그 테이블은 쓰기 전용이다.
      - name: 리포지토리 조회 메서드 소비처 게이트 계약 테스트
        run: bash scripts/check-repository-readers.test.sh

      # 순수 도메인은 IO가 없어 **단위 테스트만으로 GREEN**이 된다 — 죽어 있어도 아무 신호가 없다.
      # `effective_interval_with_robots`가 그랬고(robots Crawl-delay가 한 번도 안 지켜졌다),
      # `Purchase.expire()`가 그랬으며(관찰이 영원히 안 끝났다), `FollowUpEvaluator`가 그렇다(AL-03).
      - name: 도메인 클래스 소비처 게이트 계약 테스트
        run: bash scripts/check-domain-consumers.test.sh

      # `배송비미상` 표식은 collector가 만들고 core가 DB 너머에서 읽는다. 두 모듈이 같은 리터럴을
      # 각자 들고 있으므로, 한쪽이 이름을 바꾸면 다른 쪽은 조용히 0을 세며 "오염 없음"이라고 말한다.
      - name: 모듈 간 태그 계약 게이트 계약 테스트
        run: bash scripts/check-tag-contract.test.sh

      # `guard.sh`(PreToolUse)는 에이전트가 친 명령 문자열만 본다 — `bash scripts/x.sh` 안의
      # `curl https://www.ppomppu.co.kr`은 아무것도 막지 못한다(docs/91 Q-60). 완화책("스크립트가
      # 스스로 opt-in을 건다")에 **확인하는 법**을 붙인다.
      - name: 스크립트 네트워크 opt-in 게이트 계약 테스트
        run: bash scripts/check-network-optin.test.sh

  # SEC-08: robots 게이트는 fake opener 테스트만 통과했다. 실제 소켓을 만지는 경로는
  # **실 수집을 켜기 직전에 처음 실행된다.** 로컬 서버에 대고 운영과 같은 코드 경로를 리허설한다.
  # (이 드릴이 `urllib_opener`가 403/429를 예외로 던져 차단 감지가 죽어 있던 것을 잡았다.)
  robots:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: robots 게이트 리허설 (로컬 서버, 실 사이트 미접촉)
        run: bash scripts/check-robots-drill.sh

  # REL-05: 롤백 스크립트는 사고가 나야 처음 실행된다. 모든 V에 짝이 되는 R이 있는지,
  # 역순 적용이 스키마를 비우는지, 순서를 어기면 실패하는지를 일회용 컨테이너에서 확인한다.
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 마이그레이션 롤백 리허설
        run: bash scripts/rollback-drill.sh

  # REL-04: `restore-drill.sh`는 **덤프가 이미 있어야** 돌아서 CI에서 한 번도 실행된 적이 없었다
  # (CLAUDE.md는 "전부 CI가 돌린다"고 적어 두고 있었다 — 2026-07-10 실측: 거짓).
  # `backup-drill.sh`가 등록 → pg_dump → 격리 복원 → **행 확인**까지 왕복한다.
  # 검증되지 않은 백업은 백업이 아니고, 돌지 않는 드릴은 드릴이 아니다.
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 백업→복원 왕복 리허설 (격리 스택 + 일회용 컨테이너)
        run: bash scripts/backup-drill.sh

  # REL-04: 복구 경로는 사고가 나야 처음 실행된다. 그래서 매 커밋 리허설한다.
  # 실 AWS를 부르지 않는다 — MinIO(S3 호환)에 대고 운영과 **같은 스크립트**를 돌린다.
  offsite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 오프사이트 백업 리허설 (MinIO)
        run: bash scripts/offsite-drill.sh

  # 모듈별 테스트가 전부 GREEN이어도 스택이 뜬다는 보장은 없다. 실제로 nginx가
  # proxy_pass 업스트림을 기동 시점에 해석하다 죽은 적이 있고(docs/99), 어떤 단위
  # 테스트도 그걸 못 잡았다. 여기서 브라우저가 걷는 길을 그대로 걷는다.
  smoke:
    runs-on: ubuntu-latest
    needs: [core, collector, web]
    steps:
      - uses: actions/checkout@v4
      - name: 종단 스모크 (web -> nginx -> core -> postgres)
        run: bash scripts/smoke.sh
