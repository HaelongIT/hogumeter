# SEC-01 시크릿 스캔 설정. 기본 규칙셋을 그대로 쓰고 예외만 좁게 둔다.
#
# gitleaks 8.30 기준: 구형 `[allowlist]`와 신형 `[[allowlists]]`를 **섞을 수 없다**
# ("[allowlist] is deprecated, it cannot be used alongside [[allowlists]]").
# 그래서 둘 다 신형으로 둔다.
[extend]
useDefault = true

[[allowlists]]
description = """
캡처한 남의 페이지는 우리 시크릿이 아니다.

`collector/tests/fixtures/`는 핫딜 사이트의 응답을 **바이트 그대로** 보관한 golden이다.
그 안에는 그 사이트가 자기 페이지에 심은 토큰·해시가 들어 있고(예: 펨코 list_normal.html의
input_password.xml 토큰), gitleaks가 이를 generic-api-key로 잡는다.

**디렉토리 전체를 예외로 두지 않는다** — 실수로 `.env`를 fixtures에 떨궈도 잡히도록,
확장자를 캡처 산출물(html/json)로 한정한다.
"""
paths = [
    '''collector/tests/fixtures/.*\.(html|json)$''',
]

[[allowlists]]
description = """
smoke.sh의 Basic Auth 리허설 자격증명 — 시크릿이 아니다.

`scripts/smoke.sh` 7단계는 SEC-02(Basic Auth)의 **켠 경로**를 검증한다: 자격증명 없이 401,
올바른 자격증명으로 200. 그러려면 평문 비밀번호가 스크립트 안에 있어야 하고, 같은 파일의
apr1 해시(`htpasswd -nbm smoke smoke-pass` 산출물)와 짝이 맞아야 한다. 이 값은 스모크가
띄우는 **일회용 컨테이너**에서만 쓰이고 어디에도 배포되지 않는다.

CI는 히스토리 전체를 스캔한다(`detect`, fetch-depth 0). HEAD를 고쳐도 도입 커밋(fc5357b)이
계속 잡히므로 예외가 유일한 길이다 — 대신 **가장 좁게** 둔다.

`condition = "AND"`: 규칙·경로·문자열 셋을 **모두** 만족해야 통과한다.
- 같은 파일에 다른 자격증명(`-u admin:hunter2`)을 넣으면 잡힌다.
- 이 문자열을 다른 파일에 넣어도 잡힌다.
"""
condition   = "AND"
targetRules = ["curl-auth-user"]
paths = [
    '''^scripts/smoke\.sh$''',
]
regexes = [
    '''smoke:smoke-pass''',
]

[[allowlists]]
description = """
pre-commit 훅의 계약 테스트가 담은 가짜 자격증명 — 시크릿이 아니다.

`.githooks/pre-commit.test.sh`는 gitleaks 훅이 `curl -u` 자격증명을 **잡는지/통과시키는지**를
검증하는 테스트다. 그러려면 파일 안에 가짜 자격증명이 fixture로 들어 있어야 한다 — 이게 없으면
테스트할 대상 자체가 없다. 훅의 런타임 테스트는 임시 저장소에서 `app.sh`·`other.sh` 등 **다른
이름**으로 파일을 만들어 돌므로 이 예외(이 파일 한정)에 영향받지 않는다 — 잡는 능력은 그대로다.

CI는 히스토리 전체를 스캔한다(`detect`) → 도입 커밋(705d503)이 계속 잡히므로 예외가 유일한 길이다.

`condition = "AND"`: 이 규칙(curl-auth-user)·이 파일에서만 통과한다. 같은 파일의 다른 종류 시크릿
(aws 키 등)이나 다른 파일의 curl 자격증명은 그대로 잡힌다.
"""
condition   = "AND"
targetRules = ["curl-auth-user"]
paths = [
    '''^\.githooks/pre-commit\.test\.sh$''',
]
