# 테스트에서는 파이프라인 스케줄러를 끈다.
#
# @SpringBootTest는 애플리케이션 컨텍스트를 통째로 띄운다. 스케줄러가 살아 있으면 테스트가
# DB를 준비하는 도중에 tick이 끼어들어 `deal_event`를 만들 수 있다 — 전역 count를 세는 테스트가
# 남의 실행에 오염된다(core-java 규칙: "@SpringBootTest는 컨테이너를 공유하고 기본은 롤백이 없다").
#
# 스케줄 등록 자체를 검증하는 PipelineSchedulerWiringTest만 properties로 되켠다.
core.pipeline.enabled=false
