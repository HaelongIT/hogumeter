<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0f1319" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#eef1f5" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>호구미터</title>
    <script>
      // 첫 페인트 전에 저장된 테마를 적용해 깜빡임(FOUC)을 막는다. 없으면 CSS가 OS 선호를 따른다.
      try {
        var t = localStorage.getItem('hogu-theme')
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t)
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans+KR:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
