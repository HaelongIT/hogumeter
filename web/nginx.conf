# web 정적 자산 + /api 프록시.
#
# **CORS를 쓰지 않는 이유**: 브라우저에게 web과 core는 같은 오리진이다. `/api`를 이 nginx가
# core로 넘기므로 교차 출처 요청 자체가 발생하지 않는다. core에 CORS 설정을 추가할 필요가 없고,
# 개발(Vite 프록시)과 운영(여기)의 동작이 같다.
#
# ⚠️ 접근 통제는 아직 없다(SEC-02: 최소 토큰/Basic Auth + HTTPS). 공개망 노출 전 필수 —
# pre-deploy-checklist §C.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SEC-02 접근 통제. 40-basic-auth.sh가 기동 전에 이 파일을 만든다
    # (WEB_BASIC_AUTH_HTPASSWD가 있으면 auth_basic 켬, 없으면 off).
    # server 레벨이라 정적 자산과 /api 프록시에 모두 적용된다 — core 자체엔 인증이 없다.
    include /etc/nginx/conf.d/auth.inc;

    # Docker 내장 DNS. 아래 변수 proxy_pass가 이걸 쓴다.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # OBS-04 헬스체크. **auth_basic을 끈다** — 자격증명을 가진 사람만 "살아 있음"을
    # 확인할 수 있으면 헬스체크가 아니다. 이 응답은 nginx만 증명하고 core는 증명하지 않는다.
    location = /healthz {
        auth_basic off;
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # SPA — 알 수 없는 경로는 index.html로 돌린다(라우터가 처리).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 업스트림을 **변수로** 둔다. 리터럴로 적으면 nginx가 기동 시점에 `core`를 해석하려 하고,
        # core가 아직 안 떴으면 `host not found in upstream`으로 web 전체가 죽는다 —
        # 정적 페이지조차 못 뜬다. 변수를 쓰면 요청 시점에 해석하고, core가 없으면 502를 준다.
        set $core "core:8080";
        proxy_pass http://$core;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
